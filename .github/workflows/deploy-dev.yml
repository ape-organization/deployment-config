name: Deploy Services

on:
  push:
    branches: [ main ]
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout Config Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH


      - name: Detect Changed Files
        id: changes
        run: |

          FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

          if [ -z "$FILES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Deploy Services
        if: steps.changes.outputs.skip != 'true'
        env:

          
          
          DEV_DATABASE_NAME: ${{ secrets.DEV_DATABASE_NAME }}
          PREPROD_DATABASE_NAME: ${{ secrets.PREPROD_DATABASE_NAME }}
          PROD_DATABASE_NAME: ${{ secrets.PROD_DATABASE_NAME }}

          DEV_DATABASE_USERNAME: ${{ secrets.DEV_DATABASE_USERNAME }}
          PREPROD_DATABASE_USERNAME: ${{ secrets.PREPROD_DATABASE_USERNAME }}
          PROD_DATABASE_USERNAME: ${{ secrets.PROD_DATABASE_USERNAME }}

          DEV_DATABASE_PASSWORD: ${{ secrets.DEV_DATABASE_PASSWORD }}
          PREPROD_DATABASE_PASSWORD: ${{ secrets.PREPROD_DATABASE_PASSWORD }}
          PROD_DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}

          DEV_DATABASE_HOST: ${{ secrets.DEV_DATABASE_HOST }}
          PREPROD_DATABASE_HOST: ${{ secrets.PREPROD_DATABASE_HOST }}
          PROD_DATABASE_HOST: ${{ secrets.PROD_DATABASE_HOST }}

        run: |

          set -e

          while IFS= read -r FILE; do

            [ -z "$FILE" ] && continue

            echo "=========================="
            echo "Deploying $FILE"
            echo "=========================="

            ENV=$(echo "$FILE" | cut -d'/' -f1)
            ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

            SERVICE=$(basename $FILE .yml)

            TAG=$(yq e '.tag' $FILE)
            REPO=$(yq e '.repo' $FILE)
            TYPE=$(yq e '.type' $FILE)

            echo "ENV: $ENV"
            echo "SERVICE: $SERVICE"
            echo "TAG: $TAG"
            echo "REPO: $REPO"


            BASE="/home/Center-management/$ENV/$SERVICE"
            RELEASE="$BASE/releases/$TAG"
            WORKSPACE="/tmp/build/$SERVICE-$TAG"


            mkdir -p "$RELEASE"
            rm -rf "$WORKSPACE"


            echo "Cloning repo..."

            git clone https://github.com/$REPO "$WORKSPACE"

            cd "$WORKSPACE"

            git checkout "$TAG"


            echo "Resolving database variables..."

            DB_NAME_VAR="${ENV_UPPER}_DATABASE_NAME"
            DB_USER_VAR="${ENV_UPPER}_DATABASE_USERNAME"
            DB_PASS_VAR="${ENV_UPPER}_DATABASE_PASSWORD"
            DB_HOST_VAR="${ENV_UPPER}_DATABASE_HOST"

            DATABASE_NAME=${!DB_NAME_VAR}
            DATABASE_USERNAME=${!DB_USER_VAR}
            DATABASE_PASSWORD=${!DB_PASS_VAR}
            DATABASE_HOST=${!DB_HOST_VAR}

            if [ -z "$DATABASE_HOST" ] || [ -z "$DATABASE_NAME" ] || [ -z "$DATABASE_USERNAME" ] || [ -z "$DATABASE_PASSWORD" ]; then
              echo "ERROR: Missing DB credentials for $ENV"
              exit 1
            fi


            echo "Building service..."


            case "$TYPE" in

              java)

                mvn -B clean package -DskipTests

                JAR=$(find target -name "*.jar" | grep -v original | head -n 1)

                if [ -z "$JAR" ]; then
                  echo "ERROR: JAR not found"
                  exit 1
                fi

                cp "$JAR" "$RELEASE/app.jar"
                ;;

              node)

                npm ci
                npm run build || true
                rsync -a . "$RELEASE"
                ;;

              python)

                pip install -r requirements.txt || true
                rsync -a . "$RELEASE"
                ;;

              docker)

                docker build -t $SERVICE:$TAG .
                ;;

            esac


            echo "Updating current release..."

            ln -sfn "$RELEASE" "$BASE/current"


            if [ -f "$BASE/app.pid" ]; then
              kill $(cat "$BASE/app.pid") || true
            fi


            echo "Starting service..."


            case "$TYPE" in

              java)
            
                nohup env \
                SPRING_DATASOURCE_URL="jdbc:sqlserver://$DATABASE_HOST:1433;databaseName=$DATABASE_NAME;encrypt=false;trustServerCertificate=true" \
                SPRING_DATASOURCE_USERNAME="$DATABASE_USERNAME" \
                SPRING_DATASOURCE_PASSWORD="$DATABASE_PASSWORD" \
                  DB_PORT=1433 \
                  java -jar "$RELEASE/app.jar" \
                  > "$BASE/app.log" 2>&1 &
            
                echo $! > "$BASE/app.pid"
                ;;


              node)

                nohup env \
                  DATABASE_HOST=$DATABASE_HOST \
                  DATABASE_NAME=$DATABASE_NAME \
                  DATABASE_USERNAME=$DATABASE_USERNAME \
                  DATABASE_PASSWORD=$DATABASE_PASSWORD \
                  node "$RELEASE/dist/index.js" \
                  > "$BASE/app.log" 2>&1 &

                echo $! > "$BASE/app.pid"
                ;;


              python)

                nohup env \
                  DATABASE_HOST=$DATABASE_HOST \
                  DATABASE_NAME=$DATABASE_NAME \
                  DATABASE_USERNAME=$DATABASE_USERNAME \
                  DATABASE_PASSWORD=$DATABASE_PASSWORD \
                  python3 "$RELEASE/app.py" \
                  > "$BASE/app.log" 2>&1 &

                echo $! > "$BASE/app.pid"
                ;;


              docker)

                docker rm -f $SERVICE 2>/dev/null || true

                docker run -d \
                  --name $SERVICE \
                  -p 8080:8080 \
                  -e DATABASE_HOST=$DATABASE_HOST \
                  -e DATABASE_NAME=$DATABASE_NAME \
                  -e DATABASE_USERNAME=$DATABASE_USERNAME \
                  -e DATABASE_PASSWORD=$DATABASE_PASSWORD \
                  $SERVICE:$TAG
                ;;

              angular)
              
                npm install
              
                npm run build -- --configuration production
              
                BUILD_PATH=$(find dist -maxdepth 2 -type d | head -n 1)
              
                if [ -z "$BUILD_PATH" ]; then
                  echo "ERROR: Angular build not found"
                  exit 1
                fi
              
                rm -rf "$RELEASE"
                mkdir -p "$RELEASE"
              
                cp -r "$BUILD_PATH"/* "$RELEASE"
              
                ;;
            esac


            echo "SUCCESS: $SERVICE deployed to $ENV"


          done <<< "${{ steps.changes.outputs.files }}"
