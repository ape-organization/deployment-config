name: Deploy Service

on:
  push:
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Detect changed file
        id: changed
        run: |
          FILE=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | grep '\.yml$' | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No config file changed"
            exit 1
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Parse config
        id: config
        run: |
          FILE=${{ steps.changed.outputs.file }}

          ENV=$(echo $FILE | cut -d'/' -f1)
          SERVICE=$(basename $FILE .yml)

          TAG=$(yq e '.tag' $FILE)
          REPO=$(yq e '.repo' $FILE)

          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      - name: Deploy
        run: |

          ENV=${{ steps.config.outputs.env }}
          SERVICE=${{ steps.config.outputs.service }}
          TAG=${{ steps.config.outputs.tag }}
          REPO=${{ steps.config.outputs.repo }}

          BASE="/home/Center-management/$ENV/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          echo "Deploying $SERVICE ($TAG) in $ENV"

          mkdir -p "$BASE/releases"

          # clone only once per version
          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"

          git fetch --all --tags
          git checkout $TAG

          mvn clean package -DskipTests

          # atomic switch (zero-downtime style base)
          ln -sfn "$RELEASE" "$BASE/current"

          # restart app safely
          pkill -f "$SERVICE" || true

          nohup java -jar "$BASE/current/target/"*.jar > "$BASE/app.log" 2>&1 &
