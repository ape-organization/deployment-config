
name: Deploy Service

on:
  push:
    branches: [ main ]
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'

jobs:

  deploy-dev:
    if: contains(join(github.event.commits.*.modified, ','), 'dev/')
    runs-on: self-hosted
    environment: DEV

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Get changed file
        id: file
        run: |
          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^dev/.*\.yml$' | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Deploy
        if: steps.file.outputs.skip != 'true'
        env:
          DATABASE_HOST_SERVER: ${{ secrets.DATABASE_HOST_SERVER }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          FILE=${{ steps.file.outputs.file }}

          SERVICE=$(basename $FILE .yml)
          TAG=$(yq e '.tag' $FILE)
          REPO=$(yq e '.repo' $FILE)

          BASE="/home/Center-management/dev/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          mkdir -p "$BASE/releases"

          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"
          git fetch --all --tags
          git checkout $TAG

          mvn clean package -DskipTests

          ln -sfn "$RELEASE" "$BASE/current"

          pkill -f "$SERVICE" || true

          nohup java \
            -Ddb.host=$DATABASE_HOST_SERVER \
            -Ddb.name=$DATABASE_NAME \
            -Ddb.password=$DATABASE_PASSWORD \
            -jar "$BASE/current/target/"*.jar \
            > "$BASE/app.log" 2>&1 &


  deploy-preprod:
    if: contains(join(github.event.commits.*.modified, ','), 'preprod/')
    runs-on: self-hosted
    environment: PREPROD

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Get changed file
        id: file
        run: |
          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^preprod/.*\.yml$' | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Deploy
        if: steps.file.outputs.skip != 'true'
        env:
          DATABASE_HOST_SERVER: ${{ secrets.DATABASE_HOST_SERVER }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          FILE=${{ steps.file.outputs.file }}

          SERVICE=$(basename $FILE .yml)
          TAG=$(yq e '.tag' $FILE)
          REPO=$(yq e '.repo' $FILE)

          BASE="/home/Center-management/preprod/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          mkdir -p "$BASE/releases"

          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"
          git fetch --all --tags
          git checkout $TAG

          mvn clean package -DskipTests

          ln -sfn "$RELEASE" "$BASE/current"

          pkill -f "$SERVICE" || true

          nohup java \
            -Ddb.host=$DATABASE_HOST_SERVER \
            -Ddb.name=$DATABASE_NAME \
            -Ddb.password=$DATABASE_PASSWORD \
            -jar "$BASE/current/target/"*.jar \
            > "$BASE/app.log" 2>&1 &


  deploy-prod:
    if: contains(join(github.event.commits.*.modified, ','), 'prod/')
    runs-on: self-hosted
    environment: PROD

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Get changed file
        id: file
        run: |
          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^prod/.*\.yml$' | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Deploy
        if: steps.file.outputs.skip != 'true'
        env:
          DATABASE_HOST_SERVER: ${{ secrets.DATABASE_HOST_SERVER }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          FILE=${{ steps.file.outputs.file }}

          SERVICE=$(basename $FILE .yml)
          TAG=$(yq e '.tag' $FILE)
          REPO=$(yq e '.repo' $FILE)

          BASE="/home/Center-management/prod/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          mkdir -p "$BASE/releases"

          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"
          git fetch --all --tags
          git checkout $TAG

          mvn clean package -DskipTests

          ln -sfn "$RELEASE" "$BASE/current"

          pkill -f "$SERVICE" || true

          nohup java \
            -Ddb.host=$DATABASE_HOST_SERVER \
            -Ddb.name=$DATABASE_NAME \
            -Ddb.password=$DATABASE_PASSWORD \
            -jar "$BASE/current/target/"*.jar \
            > "$BASE/app.log" 2>&1 &
