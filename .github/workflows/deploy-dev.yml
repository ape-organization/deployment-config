name: Deploy Services

on:
  push:
    branches: [ main ]
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      # Detect changed files

      - name: Detect changed files
        id: files
        run: |

          FILES=$(git show --name-only --pretty="" ${{ github.sha }})

          if [ -z "$FILES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Deploy

      - name: Deploy services
        if: steps.files.outputs.skip != 'true'

        env:

          DATABASE_HOST_SERVER: ${{ secrets.DATABASE_HOST_SERVER }}

          DATABASE_NAME_DEV: ${{ secrets.DATABASE_NAME_DEV }}
          DATABASE_NAME_PREPROD: ${{ secrets.DATABASE_NAME_PREPROD }}
          DATABASE_NAME_PROD: ${{ secrets.DATABASE_NAME_PROD }}

          DATABASE_PASSWORD_DEV: ${{ secrets.DATABASE_PASSWORD_DEV }}
          DATABASE_PASSWORD_PREPROD: ${{ secrets.DATABASE_PASSWORD_PREPROD }}
          DATABASE_PASSWORD_PROD: ${{ secrets.DATABASE_PASSWORD_PROD }}

        run: |

          set -e

          echo "${{ steps.files.outputs.files }}" | while read FILE; do

            [ -z "$FILE" ] && continue

            echo "=============================="
            echo "Deploying: $FILE"
            echo "=============================="

            ENV=$(echo "$FILE" | cut -d'/' -f1)
            ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

            SERVICE=$(basename $FILE .yml)
            TAG=$(yq e '.tag' $FILE)
            REPO=$(yq e '.repo' $FILE)
            TYPE=$(yq e '.type' $FILE)

            BASE="/home/Center-management/$ENV/$SERVICE"
            RELEASE="$BASE/releases/$TAG"
            WORKSPACE="/tmp/build/$SERVICE-$TAG"

            mkdir -p "$BASE/releases"
            mkdir -p "$RELEASE"

            rm -rf "$WORKSPACE"

            # CLONE

            git clone https://github.com/$REPO "$WORKSPACE"

            cd "$WORKSPACE"

            git fetch --tags

            git checkout $TAG

            # ENV FILE (dynamic secrets)

            ENV_FILE="$BASE/runtime.env"

            : > "$ENV_FILE"

            for VAR in $(yq e '.env[]' $FILE 2>/dev/null); do

              SECRET_NAME="${VAR}_${ENV_UPPER}"

              VALUE=$(printenv "$SECRET_NAME")

              if [ -z "$VALUE" ]; then
                VALUE=$(printenv "$VAR")
              fi

              if [ -n "$VALUE" ]; then
                echo "$VAR=$VALUE" >> "$ENV_FILE"
              else
                echo "Missing secret: $SECRET_NAME"
              fi

            done

            # BUILD

            echo "Building $SERVICE ($TYPE)"

            case "$TYPE" in

              java)

                mvn -B clean package -DskipTests

                JAR=$(find target -name "*.jar" | grep -v original | head -n 1)

                if [ -z "$JAR" ]; then
                  echo "JAR not found"
                  exit 1
                fi

                cp "$JAR" "$RELEASE/app.jar"

                ;;

              node)

                npm ci

                npm run build || true

                rsync -a . "$RELEASE"

                ;;

              python)

                pip install -r requirements.txt || true

                rsync -a . "$RELEASE"

                ;;

              docker)

                docker build -t $SERVICE:$TAG .

                ;;

            esac

            # SWITCH RELEASE

            ln -sfn "$RELEASE" "$BASE/current"

            pkill -f "$SERVICE" || true

            # LOAD ENV

            set -a
            source "$ENV_FILE"
            set +a

            # RUN

            case "$TYPE" in

              java)

                nohup java \
                  -Dspring.datasource.url="jdbc:sqlserver://$DATABASE_HOST_SERVER:1433;database=$DATABASE_NAME;encrypt=false;trustServerCertificate=true" \
                  -Dspring.datasource.username=sa \
                  -Dspring.datasource.password=$DATABASE_PASSWORD \
                  -jar "$RELEASE/app.jar" \
                  > "$BASE/app.log" 2>&1 &

                ;;

              node)

                nohup env $(cat "$ENV_FILE" | xargs) node "$RELEASE/dist/index.js" \
                  > "$BASE/app.log" 2>&1 &

                ;;

              python)

                nohup env $(cat "$ENV_FILE" | xargs) python3 "$RELEASE/app.py" \
                  > "$BASE/app.log" 2>&1 &

                ;;

              docker)

                docker rm -f $SERVICE 2>/dev/null || true

                docker run -d \
                  --name $SERVICE \
                  --env-file "$ENV_FILE" \
                  -p 0:8080 \
                  $SERVICE:$TAG

                ;;

            esac

            echo "Deployed: $SERVICE ($ENV)"

          done
