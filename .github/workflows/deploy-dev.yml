name: Deploy Services

on:
  push:
    branches: [ main ]
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      # Detect changes
      - name: Detect changed files
        id: changes
        run: |
          FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

          if [ -z "$FILES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Deploy
      - name: Deploy services
        if: steps.changes.outputs.skip != 'true'
        env:
          DATABASE_HOST_SERVER: ${{ secrets.DATABASE_HOST_SERVER }}

          DATABASE_NAME_DEV: ${{ secrets.DATABASE_NAME_DEV }}
          DATABASE_NAME_PREPROD: ${{ secrets.DATABASE_NAME_PREPROD }}
          DATABASE_NAME_PROD: ${{ secrets.DATABASE_NAME_PROD }}

          DATABASE_PASSWORD_DEV: ${{ secrets.DATABASE_PASSWORD_DEV }}
          DATABASE_PASSWORD_PREPROD: ${{ secrets.DATABASE_PASSWORD_PREPROD }}
          DATABASE_PASSWORD_PROD: ${{ secrets.DATABASE_PASSWORD_PROD }}

        run: |
          set -e

          echo "${{ steps.changes.outputs.files }}" | while read FILE; do
            [ -z "$FILE" ] && continue

            echo "============================"
            echo "Deploying: $FILE"
            echo "============================"

            ENV=$(echo "$FILE" | cut -d'/' -f1)
            ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

            SERVICE=$(basename $FILE .yml)
            TAG=$(yq e '.tag' $FILE)
            REPO=$(yq e '.repo' $FILE)
            TYPE=$(yq e '.type' $FILE)

            BASE="/home/Center-management/$ENV/$SERVICE"
            RELEASE="$BASE/releases/$TAG"
            WORKSPACE="/tmp/build/$SERVICE-$TAG"

            mkdir -p "$RELEASE"
            rm -rf "$WORKSPACE"

            # Clone
            git clone https://github.com/$REPO "$WORKSPACE"
            cd "$WORKSPACE"
            git checkout $TAG

            # =========================
            # SAFE ENV RESOLUTION
            # =========================

            DB_NAME_VAR="DATABASE_NAME_${ENV_UPPER}"
            DB_PASS_VAR="DATABASE_PASSWORD_${ENV_UPPER}"

            DATABASE_NAME=$(printenv "$DB_NAME_VAR")
            DATABASE_PASSWORD=$(printenv "$DB_PASS_VAR")

            if [ -z "$DATABASE_NAME" ]; then
              echo "ERROR: Missing DATABASE_NAME for $ENV"
              exit 1
            fi

            if [ -z "$DATABASE_PASSWORD" ]; then
              echo "ERROR: Missing DATABASE_PASSWORD for $ENV"
              exit 1
            fi

            # =========================
            # BUILD
            # =========================

            echo "Building $SERVICE ($TYPE)"

            case "$TYPE" in
              java)
                mvn -B clean package -DskipTests

                JAR=$(find target -name "*.jar" | grep -v original | head -n 1)

                if [ -z "$JAR" ]; then
                  echo "ERROR: JAR not found"
                  exit 1
                fi

                cp "$JAR" "$RELEASE/app.jar"
                ;;

              node)
                npm ci
                npm run build || true
                rsync -a . "$RELEASE"
                ;;

              python)
                pip install -r requirements.txt || true
                rsync -a . "$RELEASE"
                ;;

              docker)
                docker build -t $SERVICE:$TAG .
                ;;
            esac

            # Switch release (atomic)
            ln -sfn "$RELEASE" "$BASE/current"

            # Stop old process safely
            pkill -f "$SERVICE" || true

            # =========================
            # RUN (SAFE HOT SERVER)
            # =========================

            case "$TYPE" in
              java)
                nohup java \
                  -Dserver.port=8080 \
                  -Dspring.datasource.url="jdbc:sqlserver://$DATABASE_HOST_SERVER:1433;databaseName=$DATABASE_NAME;encrypt=false;trustServerCertificate=true"\
                  -Dspring.datasource.username=sa \
                  -Dspring.datasource.password="$DATABASE_PASSWORD" \
                  -jar "$RELEASE/app.jar" \
                  > "$BASE/app.log" 2>&1 &
                ;;

              node)
                nohup env \
                  DATABASE_HOST_SERVER=$DATABASE_HOST_SERVER \
                  DATABASE_NAME=$DATABASE_NAME \
                  DATABASE_PASSWORD=$DATABASE_PASSWORD \
                  node "$RELEASE/dist/index.js" \
                  > "$BASE/app.log" 2>&1 &
                ;;

              python)
                nohup env \
                  DATABASE_HOST_SERVER=$DATABASE_HOST_SERVER \
                  DATABASE_NAME=$DATABASE_NAME \
                  DATABASE_PASSWORD=$DATABASE_PASSWORD \
                  python3 "$RELEASE/app.py" \
                  > "$BASE/app.log" 2>&1 &
                ;;

              docker)
                docker rm -f $SERVICE 2>/dev/null || true

                docker run -d \
                  --name $SERVICE \
                  --env DATABASE_HOST_SERVER=$DATABASE_HOST_SERVER \
                  --env DATABASE_NAME=$DATABASE_NAME \
                  --env DATABASE_PASSWORD=$DATABASE_PASSWORD \
                  -p 8080:8080 \
                  $SERVICE:$TAG
                ;;
            esac

            echo "SUCCESS: Deployed $SERVICE ($ENV)"
          done
