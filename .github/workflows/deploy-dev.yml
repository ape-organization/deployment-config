name: Deploy Service

on:
  push:
    branches: [ main ]
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      # -----------------------------
      # Checkout deployment-config repo
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v3

      # -----------------------------
      # Download yq locally
      # -----------------------------
      - name: Install yq locally
        run: |
          wget -qO yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x yq

      # -----------------------------
      # Detect changed YAML file
      # -----------------------------
      - name: Detect changed config
        id: changed
        run: |

          FILE=$(git diff --name-only HEAD~1 HEAD | grep '\.yml$' | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "No YAML config changed"
            echo "file=NONE" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Config file: $FILE"
          echo "file=$FILE" >> $GITHUB_OUTPUT

      # -----------------------------
      # Parse YAML
      # -----------------------------
      - name: Parse config
        if: steps.changed.outputs.file != 'NONE'
        id: config
        run: |

          FILE=${{ steps.changed.outputs.file }}

          ENV=$(echo $FILE | cut -d'/' -f1)
          SERVICE=$(basename $FILE .yml)

          TAG=$(./yq e '.tag' $FILE)
          REPO=$(./yq e '.repo' $FILE)

          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      # -----------------------------
      # Deploy
      # -----------------------------
      - name: Deploy Service
        if: steps.changed.outputs.file != 'NONE'
        run: |

          ENV=${{ steps.config.outputs.env }}
          SERVICE=${{ steps.config.outputs.service }}
          TAG=${{ steps.config.outputs.tag }}
          REPO=${{ steps.config.outputs.repo }}

          BASE="/home/Center-management/$ENV/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          echo "Deploying $SERVICE"
          echo "Environment: $ENV"
          echo "Tag: $TAG"

          mkdir -p "$BASE/releases"

          # clone repo for release
          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"

          git fetch --all --tags
          git checkout $TAG

          mvn clean package -DskipTests

          # switch current release
          ln -sfn "$RELEASE" "$BASE/current"

          # stop old service
          pkill -f "$SERVICE" || true

          # start new version
          nohup java -jar "$BASE/current/target/"*.jar > "$BASE/app.log" 2>&1 &

          echo "Deploy finished"
