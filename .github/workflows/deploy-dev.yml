name: Deploy Service

on:
  push:
    branches: [ main ]
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      # ---------------------------------
      # Checkout repository (full history)
      # ---------------------------------
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ---------------------------------
      # Install yq (YAML parser)
      # ---------------------------------
      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq

      # ---------------------------------
      # Detect changed YAML file
      # ---------------------------------
      - name: Detect changed YAML
        id: changed
        run: |

          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\.yml$' | head -n 1 || true)

          echo "Changed file: $FILE"

          if [ -z "$FILE" ]; then
            echo "No YAML config changed → skipping deploy"
            echo "file=NONE" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT
      - name: Parse config
        id: config
        if: steps.changed.outputs.file != 'NONE'
        run: |

          FILE=${{ steps.changed.outputs.file }}

          ENV=$(echo $FILE | cut -d'/' -f1)
          SERVICE=$(basename $FILE .yml)

          TAG=$(yq e '.tag' $FILE)
          REPO=$(yq e '.repo' $FILE)

          echo "Environment: $ENV"
          echo "Service: $SERVICE"
          echo "Tag: $TAG"
          echo "Repo: $REPO"

          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      - name: Deploy service
        if: steps.changed.outputs.file != 'NONE'
        run: |

          ENV=${{ steps.config.outputs.env }}
          SERVICE=${{ steps.config.outputs.service }}
          TAG=${{ steps.config.outputs.tag }}
          REPO=${{ steps.config.outputs.repo }}

          BASE="/home/Center-management/$ENV/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          echo "🚀 Deploying $SERVICE version $TAG in $ENV"

          mkdir -p "$BASE/releases"

          # clone repo only if this version not exists
          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"

          git fetch --all --tags
          git checkout $TAG

          # build project
          mvn clean package -DskipTests

          # switch release (atomic deploy)
          ln -sfn "$RELEASE" "$BASE/current"

          # restart service
          pkill -f "$SERVICE" || true

          nohup java -jar "$BASE/current/target/"*.jar > "$BASE/app.log" 2>&1 &
