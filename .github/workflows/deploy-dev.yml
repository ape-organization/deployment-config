name: Deploy DEV

on:
  push:
    paths:
      - 'dev/*.yml'
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install yq
        run: |
          sudo wget -qO /usr/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/bin/yq

      - name: Read tag
        id: config
        run: |
          TAG=$(yq '.tag' dev/ape-students-center-management.yml)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Deploy
        run: |
          cd /home/Center-management/dev/ape-students-center-management

          git fetch --tags
          git checkout ${{ steps.config.outputs.tag }}

          mvn clean package -DskipTests

          pkill -f 'ape-students-center-management' || true

          nohup java -jar target/*.jar --server.port=8081 > app.log 2>&1 &
