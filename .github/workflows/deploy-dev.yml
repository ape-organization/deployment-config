name: Deploy Service

on:
  push:
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      # -----------------------
      # Checkout repo
      # -----------------------
      - name: Checkout
        uses: actions/checkout@v3

      # -----------------------
      # Install yq locally
      # -----------------------
      - name: Install yq
        run: |
          wget -qO yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x yq

      # -----------------------
      # Detect changed YAML file
      # -----------------------
      - name: Detect changed file
        id: changed
        run: |

          FILE=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | grep '\.yml$' | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "No YAML config changed → skipping deploy"
            echo "file=NONE" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed config file: $FILE"
          echo "file=$FILE" >> $GITHUB_OUTPUT

      # -----------------------
      # Parse YAML config
      # -----------------------
      - name: Parse config
        id: config
        if: steps.changed.outputs.file != 'NONE'
        run: |

          FILE=${{ steps.changed.outputs.file }}

          ENV=$(echo $FILE | cut -d'/' -f1)
          SERVICE=$(basename $FILE .yml)

          TAG=$(./yq e '.tag' $FILE)
          REPO=$(./yq e '.repo' $FILE)

          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      # -----------------------
      # Deploy
      # -----------------------
      - name: Deploy
        if: steps.changed.outputs.file != 'NONE'
        run: |

          ENV=${{ steps.config.outputs.env }}
          SERVICE=${{ steps.config.outputs.service }}
          TAG=${{ steps.config.outputs.tag }}
          REPO=${{ steps.config.outputs.repo }}

          BASE="/home/Center-management/$ENV/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          echo "🚀 Deploying $SERVICE version $TAG to $ENV"

          mkdir -p "$BASE/releases"

          # clone version if not exists
          if [ ! -d "$RELEASE" ]; then
            echo "Cloning repo..."
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"

          echo "Fetching tags..."
          git fetch --all --tags

          echo "Checkout tag $TAG"
          git checkout $TAG

          echo "Build service"
          mvn clean package -DskipTests

          echo "Switch current release"
          ln -sfn "$RELEASE" "$BASE/current"

          echo "Restart service"
          pkill -f "$SERVICE" || true

          nohup java -jar "$BASE/current/target/"*.jar > "$BASE/app.log" 2>&1 &

          echo "✅ Deploy completed"
