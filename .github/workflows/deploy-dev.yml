name: Deploy Services

on:
  push:
    branches: [ main ]
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Detect changed files
        id: files
        run: |

          git fetch origin main

          FILES=$(git show --name-only --pretty="" ${{ github.sha }})
          
          echo "Changed files:"
          echo "$FILES"

          if [ -z "$FILES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Deploy services
        if: steps.files.outputs.skip != 'true'
        env:
          DATABASE_HOST_SERVER: ${{ secrets.DATABASE_HOST_SERVER }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |

          echo "${{ steps.files.outputs.files }}" | while read FILE; do

            [ -z "$FILE" ] && continue

            echo "=============================="
            echo "Deploying $FILE"
            echo "=============================="

            ENV=$(echo "$FILE" | cut -d'/' -f1)

            SERVICE=$(basename $FILE .yml)
            TAG=$(yq e '.tag' $FILE)
            REPO=$(yq e '.repo' $FILE)
            TYPE=$(yq e '.type' $FILE)

            BASE="/home/Center-management/$ENV/$SERVICE"
            RELEASE="$BASE/releases/$TAG"

            mkdir -p "$BASE/releases"

            if [ ! -d "$RELEASE" ]; then
              git clone https://github.com/$REPO "$RELEASE"
            fi

            cd "$RELEASE"
            git fetch --all --tags
            git checkout $TAG

            echo "Building $SERVICE ($TYPE)"

            #################################
            # BUILD
            #################################
            case "$TYPE" in

              java)
                mvn clean package -DskipTests
                ;;

              node)
                npm install
                npm run build || true
                ;;

              python)
                pip install -r requirements.txt || true
                ;;

              docker)
                docker build -t $SERVICE:$TAG .
                ;;

              *)
                echo "Unknown type, skipping build"
                ;;
            esac

            ln -sfn "$RELEASE" "$BASE/current"

            pkill -f "$SERVICE" || true

            #################################
            # RUN
            #################################
            case "$TYPE" in

              java)
                nohup java \
                  -Dspring.datasource.url="jdbc:sqlserver://$DATABASE_HOST_SERVER:1433;database=$DATABASE_NAME;encrypt=false;trustServerCertificate=true" \
                  -Dspring.datasource.username=sa \
                  -Dspring.datasource.password=$DATABASE_PASSWORD \
                  -jar "$BASE/current/target/"*.jar \
                  > "$BASE/app.log" 2>&1 &
                ;;

              node)
                nohup node "$BASE/current/dist/index.js" \
                  > "$BASE/app.log" 2>&1 &
                ;;

              python)
                nohup python3 "$BASE/current/app.py" \
                  > "$BASE/app.log" 2>&1 &
                ;;

              docker)
                docker rm -f $SERVICE 2>/dev/null || true
                docker run -d \
                  --name $SERVICE \
                  -p 0:8080 \
                  $SERVICE:$TAG
                ;;
            esac

            echo "✅ $SERVICE deployed in $ENV"

          done
