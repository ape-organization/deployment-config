name: Deploy Service

on:
  push:
    branches: [ main ]
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      # ----------------------------
      # Checkout repository
      # ----------------------------
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ----------------------------
      # Install yq locally (no sudo)
      # ----------------------------
      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      # ----------------------------
      # Detect changed YAML file
      # ----------------------------
      - name: Detect changed YAML
        id: changed
        run: |

          FILE=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\.yml$' | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "No YAML config changed → skipping deploy"
            echo "file=NONE" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed file: $FILE"
          echo "file=$FILE" >> $GITHUB_OUTPUT

      # ----------------------------
      # Parse YAML config
      # ----------------------------
      - name: Parse config
        id: config
        if: steps.changed.outputs.file != 'NONE'
        run: |

          FILE=${{ steps.changed.outputs.file }}

          ENV=$(echo $FILE | cut -d'/' -f1)
          SERVICE=$(basename $FILE .yml)

          TAG=$(yq e '.tag' $FILE)
          REPO=$(yq e '.repo' $FILE)

          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      # ----------------------------
      # Deploy
      # ----------------------------
      - name: Deploy service
        if: steps.changed.outputs.file != 'NONE'
        run: |

          ENV=${{ steps.config.outputs.env }}
          SERVICE=${{ steps.config.outputs.service }}
          TAG=${{ steps.config.outputs.tag }}
          REPO=${{ steps.config.outputs.repo }}

          BASE="/home/Center-management/$ENV/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          echo "Deploying $SERVICE version $TAG in $ENV"

          mkdir -p "$BASE/releases"

          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"

          git fetch --all --tags
          git checkout $TAG

          mvn clean package -DskipTests

          ln -sfn "$RELEASE" "$BASE/current"

          pkill -f "$SERVICE" || true

          nohup java -jar "$BASE/current/target/"*.jar > "$BASE/app.log" 2>&1 &
