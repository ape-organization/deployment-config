name: Deploy Service

on:
  push:
    branches: [ main ]
    paths:
      - 'dev/*.yml'
      - 'preprod/*.yml'
      - 'prod/*.yml'

jobs:

  deploy-dev:
    runs-on: self-hosted
    environment: DEV

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      # ✅ FIX: detect changes بطريقة صح
      - name: Detect dev changes
        id: file
        run: |
          FILE=$(printf "%s\n" "${{ join(github.event.commits.*.modified, '\n') }}" | grep '^dev/.*\.yml$' | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Deploy DEV
        if: steps.file.outputs.skip != 'true'
        env:
          DATABASE_HOST_SERVER: ${{ secrets.DATABASE_HOST_SERVER }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME_DEV }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD_DEV }}
        run: |
          FILE=${{ steps.file.outputs.file }}

          SERVICE=$(basename $FILE .yml)
          TAG=$(yq e '.tag' $FILE)
          REPO=$(yq e '.repo' $FILE)

          BASE="/home/Center-management/dev/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          echo "Deploying $SERVICE version $TAG in DEV"

          mkdir -p "$BASE/releases"

          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"
          git fetch --all --tags
          git checkout $TAG

          mvn clean package -DskipTests

          ln -sfn "$RELEASE" "$BASE/current"

          pkill -f "$SERVICE" || true

          # ✅ FIX: Spring datasource variables
          nohup java \
            -Dspring.datasource.url="jdbc:sqlserver://$DATABASE_HOST_SERVER:1433;database=$DATABASE_NAME;encrypt=false;trustServerCertificate=true" \
            -Dspring.datasource.username=sa \
            -Dspring.datasource.password=$DATABASE_PASSWORD \
            -jar "$BASE/current/target/"*.jar \
            > "$BASE/app.log" 2>&1 &


  deploy-preprod:
    runs-on: self-hosted
    environment: PREPROD

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Detect preprod changes
        id: file
        run: |
          FILE=$(printf "%s\n" "${{ join(github.event.commits.*.modified, '\n') }}" | grep '^preprod/.*\.yml$' | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Deploy PREPROD
        if: steps.file.outputs.skip != 'true'
        env:
          DATABASE_HOST_SERVER: ${{ secrets.DATABASE_HOST_SERVER }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          FILE=${{ steps.file.outputs.file }}

          SERVICE=$(basename $FILE .yml)
          TAG=$(yq e '.tag' $FILE)
          REPO=$(yq e '.repo' $FILE)

          BASE="/home/Center-management/preprod/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          echo "Deploying $SERVICE version $TAG in PREPROD"

          mkdir -p "$BASE/releases"

          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"
          git fetch --all --tags
          git checkout $TAG

          mvn clean package -DskipTests

          ln -sfn "$RELEASE" "$BASE/current"

          pkill -f "$SERVICE" || true

          nohup java \
            -Dspring.datasource.url="jdbc:sqlserver://$DATABASE_HOST_SERVER:1433;database=$DATABASE_NAME;encrypt=false;trustServerCertificate=true" \
            -Dspring.datasource.username=sa \
            -Dspring.datasource.password=$DATABASE_PASSWORD \
            -jar "$BASE/current/target/"*.jar \
            > "$BASE/app.log" 2>&1 &


  deploy-prod:
    runs-on: self-hosted
    environment: PROD

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install yq
        run: |
          mkdir -p $HOME/bin
          wget -qO $HOME/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/bin/yq
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Detect prod changes
        id: file
        run: |
          FILE=$(printf "%s\n" "${{ join(github.event.commits.*.modified, '\n') }}" | grep '^prod/.*\.yml$' | head -n 1 || true)

          if [ -z "$FILE" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Deploy PROD
        if: steps.file.outputs.skip != 'true'
        env:
          DATABASE_HOST_SERVER: ${{ secrets.DATABASE_HOST_SERVER }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          FILE=${{ steps.file.outputs.file }}

          SERVICE=$(basename $FILE .yml)
          TAG=$(yq e '.tag' $FILE)
          REPO=$(yq e '.repo' $FILE)

          BASE="/home/Center-management/prod/$SERVICE"
          RELEASE="$BASE/releases/$TAG"

          echo "Deploying $SERVICE version $TAG in PROD"

          mkdir -p "$BASE/releases"

          if [ ! -d "$RELEASE" ]; then
            git clone https://github.com/$REPO "$RELEASE"
          fi

          cd "$RELEASE"
          git fetch --all --tags
          git checkout $TAG

          mvn clean package -DskipTests

          ln -sfn "$RELEASE" "$BASE/current"

          pkill -f "$SERVICE" || true

          nohup java \
            -Dspring.datasource.url="jdbc:sqlserver://$DATABASE_HOST_SERVER:1433;database=$DATABASE_NAME;encrypt=false;trustServerCertificate=true" \
            -Dspring.datasource.username=sa \
            -Dspring.datasource.password=$DATABASE_PASSWORD \
            -jar "$BASE/current/target/"*.jar \
            > "$BASE/app.log" 2>&1 &
